<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcards</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">

<style>
/* (your entire CSS stays unchanged — omitted here for space, keep yours exactly) */
</style>
</head>

<body>
<div class="app" id="app"></div>
<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY='ankiclone_v1';

/* ---------------- CORE ---------------- */

function sm2(card,rating){
  let {interval,ease,reps}=card;
  const q=[1,2,3,4][rating];

  if(q<2){
    reps=0;
    interval=1;
  } else {
    if(reps===0)interval=1;
    else if(reps===1)interval=6;
    else interval=Math.round(interval*ease);
    reps++;
  }

  ease=Math.max(1.3,ease+0.1-(3-q)*(0.08+(3-q)*0.02));
  if(rating===3)interval=Math.round(interval*1.3);

  return {...card,interval,ease,reps,due:Date.now()+interval*86400000,lastReviewed:Date.now()};
}

function newCard(front,back,deckId){
  return{
    id:crypto.randomUUID(),
    deckId,
    front,
    back,
    interval:1,
    ease:2.5,
    reps:0,
    due:Date.now()-1000,
    lastReviewed:null,
    created:Date.now()
  };
}

/* ---------------- STATE ---------------- */

let state={
  decks:[],
  cards:[],
  view:'home',
  activeDeckId:null,
  studyQueue:[],
  studyIdx:0,
  showAnswer:false,
  modal:null,
  editCardId:null,
  studyStarted:false
};

/* ---------------- STORAGE ---------------- */

function load(){
  const d=JSON.parse(localStorage.getItem(STORAGE_KEY)||'null');
  if(d){state.decks=d.decks||[];state.cards=d.cards||[];}
  if(!state.decks.length) seed();
}

function save(){
  localStorage.setItem(STORAGE_KEY,JSON.stringify({decks:state.decks,cards:state.cards}));
}

/* ---------------- SEED ---------------- */

function seed(){
  const deck={id:crypto.randomUUID(),name:'General Knowledge',created:Date.now()};
  state.decks=[deck];
  state.cards=[
    newCard('Capital of France?','Paris',deck.id),
    newCard('WW2 ended?','1945',deck.id)
  ];
  save();
}

/* ---------------- RENDER ---------------- */

function render(){
  document.getElementById('app').innerHTML=`
    <div class="nav">Flashcards</div>
    <div class="content">${renderData()}</div>
  `;
  attach();
}

function renderData(){
  return `
    <div class="export-box">
      <h3>Import Anki CSV</h3>

      <input type="file" id="ankiFileInput" accept=".csv,.txt">

      <button class="btn btn-primary" id="importAnkiBtn">
        Import
      </button>

      <div id="ankiImportStatus"></div>
    </div>
  `;
}

/* ---------------- IMPORT (FIXED) ---------------- */

function attach(){
  const btn=document.getElementById('importAnkiBtn');

  if(btn){
    btn.addEventListener('click',async()=>{

      const file=document.getElementById('ankiFileInput').files[0];
      const status=document.getElementById('ankiImportStatus');

      if(!file){
        status.textContent='Select a file first.';
        return;
      }

      const text=await file.text();
      const lines=text.split(/\r?\n/).filter(l=>l.trim());

      const deckId=crypto.randomUUID();
      const deckName=prompt('Deck name?','Imported Deck')||'Imported Deck';

      state.decks.push({id:deckId,name:deckName,created:Date.now()});

      let count=0;

      for(const line of lines){
        const parts=line.split(',');
        if(parts.length<2)continue;

        const front=parts[0].replace(/(^"|"$)/g,'').trim();
        const back=parts.slice(1).join(',').replace(/(^"|"$)/g,'').trim();

        if(!front||!back)continue;

        state.cards.push(newCard(front,back,deckId));
        count++;
      }

      save();
      render();

      status.textContent=`Imported ${count} cards`;
    });
  }
}

/* ---------------- START ---------------- */

load();
render();

</script>
</body>
</html>
