<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcards</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#f7f5f0;--surface:#ffffff;--surface2:#f0ede6;
    --border:#e2ddd5;--border2:#c8c3b8;
    --text:#1a1814;--text2:#6b6560;--text3:#9b958e;
    --accent:#2d5016;--accent-bg:#e8f0df;--accent-light:#f0f5ea;
    --danger:#8b1a1a;--danger-bg:#fceaea;
    --warn:#7a4a00;--warn-bg:#fef3e2;
    --blue:#1a3a6b;--blue-bg:#e8eef8;
    --radius:10px;--radius-lg:16px;
    --mono:'IBM Plex Mono',monospace;
    --sans:'IBM Plex Sans',sans-serif;
  }
  body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;font-size:15px}
  .app{display:flex;flex-direction:column;height:100vh;max-width:760px;margin:0 auto}
  .nav{display:flex;align-items:center;gap:8px;padding:14px 20px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
  .nav-brand{font-family:var(--mono);font-size:16px;font-weight:500;color:var(--accent);letter-spacing:-0.5px}
  .nav-brand span{color:var(--text3)}
  .nav-tabs{display:flex;gap:2px;margin-left:auto}
  .tab-btn{font-family:var(--sans);font-size:13px;padding:6px 14px;border:none;background:none;color:var(--text2);cursor:pointer;border-radius:6px;font-weight:500;transition:all 0.15s}
  .tab-btn:hover{background:var(--surface2);color:var(--text)}
  .tab-btn.active{background:var(--accent-bg);color:var(--accent)}
  .content{flex:1;overflow-y:auto;padding:24px 20px}
  .section-title{font-size:12px;font-weight:600;color:var(--text3);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:12px}
  .deck-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
  .deck-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;cursor:pointer;transition:all 0.15s;position:relative}
  .deck-card:hover{border-color:var(--border2);transform:translateY(-1px)}
  .deck-card.has-due{border-left:3px solid var(--accent)}
  .deck-name{font-weight:500;font-size:15px;margin-bottom:6px;color:var(--text)}
  .deck-stats{display:flex;gap:12px;font-size:12px}
  .stat-new{color:var(--blue)}.stat-due{color:var(--danger)}.stat-total{color:var(--text3)}
  .deck-actions{position:absolute;top:10px;right:10px;display:flex;gap:4px;opacity:0;transition:opacity 0.15s}
  .deck-card:hover .deck-actions{opacity:1}
  .icon-btn{background:none;border:none;cursor:pointer;color:var(--text3);padding:4px;border-radius:6px;line-height:1;font-size:16px}
  .icon-btn:hover{background:var(--surface2);color:var(--text)}
  .icon-btn.danger:hover{background:var(--danger-bg);color:var(--danger)}
  .add-deck-btn{background:var(--surface);border:1px dashed var(--border2);border-radius:var(--radius-lg);padding:16px;cursor:pointer;display:flex;align-items:center;gap:8px;color:var(--text3);font-size:14px;font-family:var(--sans);transition:all 0.15s;width:100%}
  .add-deck-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
  .browse-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
  .back-btn{display:flex;align-items:center;gap:6px;background:none;border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-family:var(--sans);font-size:13px;cursor:pointer;color:var(--text2);transition:all 0.15s}
  .back-btn:hover{background:var(--surface2);color:var(--text)}
  .browse-title{font-weight:500;font-size:17px}
  .card-list{display:flex;flex-direction:column;gap:8px}
  .card-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;display:flex;align-items:flex-start;gap:12px}
  .card-item-content{flex:1;min-width:0}
  .card-front{font-size:14px;font-weight:500;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .card-back{font-size:13px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .card-item-actions{display:flex;gap:4px;flex-shrink:0}
  .form-group{margin-bottom:14px}
  .form-label{font-size:12px;font-weight:600;color:var(--text3);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:6px;display:block}
  .form-input,.form-textarea{width:100%;font-family:var(--sans);font-size:14px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);outline:none;transition:border-color 0.15s;resize:none}
  .form-input:focus,.form-textarea:focus{border-color:var(--accent)}
  .form-textarea{min-height:80px;line-height:1.5}
  .btn{font-family:var(--sans);font-size:14px;font-weight:500;padding:9px 18px;border-radius:8px;border:none;cursor:pointer;transition:all 0.15s}
  .btn-primary{background:var(--accent);color:#fff}
  .btn-primary:hover{opacity:0.9}
  .btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
  .btn-secondary:hover{background:var(--border)}
  .btn-row{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
  .study-view{display:flex;flex-direction:column;align-items:center;height:100%;padding:20px}
  .study-header{width:100%;display:flex;align-items:center;gap:10px;margin-bottom:24px}
  .study-progress{flex:1;height:5px;background:var(--surface2);border-radius:3px;overflow:hidden}
  .study-progress-bar{height:100%;background:var(--accent);border-radius:3px;transition:width 0.3s}
  .study-counts{display:flex;gap:12px;font-size:13px;font-weight:500}
  .cnt-new{color:var(--blue)}.cnt-due{color:var(--danger)}.cnt-done{color:var(--accent)}
  .flashcard{width:100%;max-width:560px;min-height:220px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:40px 36px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;transition:all 0.2s;position:relative;flex-shrink:0}
  .flashcard:hover{border-color:var(--border2)}
  .flashcard-label{font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);margin-bottom:16px}
  .flashcard-text{font-size:18px;line-height:1.6;color:var(--text)}
  .flashcard-divider{width:40px;height:1px;background:var(--border);margin:20px auto}
  .flashcard-answer{font-size:16px;color:var(--text2);line-height:1.6}
  .tap-hint{font-size:12px;color:var(--text3);position:absolute;bottom:14px}
  .answer-btns{display:flex;gap:10px;margin-top:20px;width:100%;max-width:560px;justify-content:center;flex-wrap:wrap}
  .rating-btn{flex:1;min-width:80px;max-width:130px;font-family:var(--sans);font-size:13px;font-weight:500;padding:12px 8px;border-radius:10px;border:1px solid var(--border);cursor:pointer;transition:all 0.15s;line-height:1.3}
  .rating-btn:hover{transform:translateY(-2px)}
  .rating-btn .interval{display:block;font-size:11px;font-weight:400;margin-top:3px;opacity:0.7}
  .r-again{background:var(--danger-bg);color:var(--danger);border-color:#f5c6c6}.r-again:hover{background:#f9d5d5}
  .r-hard{background:var(--warn-bg);color:var(--warn);border-color:#fde8c0}.r-hard:hover{background:#fde0a0}
  .r-good{background:var(--accent-bg);color:var(--accent);border-color:#d0e8b8}.r-good:hover{background:#ddefc8}
  .r-easy{background:var(--blue-bg);color:var(--blue);border-color:#c5d8f5}.r-easy:hover{background:#d5e5f8}
  .done-state{text-align:center;padding:40px 20px}
  .done-icon{font-size:48px;margin-bottom:16px;color:var(--accent)}
  .done-title{font-size:22px;font-weight:500;margin-bottom:8px}
  .done-sub{font-size:15px;color:var(--text2);margin-bottom:24px}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.35);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
  .modal{background:var(--surface);border-radius:var(--radius-lg);padding:24px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;border:1px solid var(--border)}
  .modal-title{font-size:17px;font-weight:500;margin-bottom:20px}
  .empty{text-align:center;padding:48px 20px;color:var(--text3)}
  .empty i{font-size:40px;margin-bottom:12px;display:block}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;opacity:0;transition:all 0.2s;z-index:200;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .study-start-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;text-align:center;max-width:380px;margin:0 auto}
  .start-title{font-size:18px;font-weight:500;margin-bottom:8px}
  .start-stats{display:flex;justify-content:center;gap:20px;margin-bottom:20px;font-size:13px}
  .export-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin-bottom:20px}
  .export-box h3{font-size:14px;font-weight:500;margin-bottom:8px}
  .export-box p{font-size:13px;color:var(--text2);margin-bottom:14px;line-height:1.5}
  .export-textarea{width:100%;font-family:var(--mono);font-size:11px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px;color:var(--text);resize:vertical;min-height:100px;outline:none}
  .import-error{color:var(--danger);font-size:13px;margin-top:6px}
</style>
</head>
<body>
<div class="app" id="app"></div>
<div class="toast" id="toast"></div>
<script>
const STORAGE_KEY='ankiclone_v1';
function sm2(card,rating){
  let {interval,ease,reps}=card;
  const q=[1,2,3,4][rating];
  if(q<2){reps=0;interval=1;}
  else{if(reps===0)interval=1;else if(reps===1)interval=6;else interval=Math.round(interval*ease);reps++;}
  ease=Math.max(1.3,ease+0.1-(3-q)*(0.08+(3-q)*0.02));
  if(rating===3)interval=Math.round(interval*1.3);
  return{...card,interval,ease,reps,due:Date.now()+interval*86400000,lastReviewed:Date.now()};
}
function getIntervalLabel(card,rating){
  const{interval,ease,reps}=card;const q=[1,2,3,4][rating];
  if(q<2)return'<1d';
  let iv=reps===0?1:reps===1?6:Math.round(interval*ease);
  if(rating===3)iv=Math.round(iv*1.3);
  return iv<30?`${iv}d`:iv<365?`${Math.round(iv/30)}mo`:`${(iv/365).toFixed(1)}y`;
}
function newCard(front,back,deckId){
  return{id:crypto.randomUUID(),deckId,front,back,interval:1,ease:2.5,reps:0,due:Date.now()-1000,lastReviewed:null,created:Date.now()};
}
function isDue(c){return c.due<=Date.now();}
function isNew(c){return c.reps===0;}
let state={decks:[],cards:[],view:'home',activeDeckId:null,studyQueue:[],studyIdx:0,showAnswer:false,modal:null,editCardId:null,studyStarted:false,toastTimer:null};
function load(){
  try{const d=JSON.parse(localStorage.getItem(STORAGE_KEY)||'null');if(d){state.decks=d.decks||[];state.cards=d.cards||[];}}catch(e){}
  if(!state.decks.length)seedData();
}
function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify({decks:state.decks,cards:state.cards}));}
function seedData(){
  const d1={id:crypto.randomUUID(),name:'General Knowledge',created:Date.now()};
  const d2={id:crypto.randomUUID(),name:'Spanish Vocab',created:Date.now()};
  state.decks=[d1,d2];
  state.cards=[
    newCard('What is the capital of France?','Paris',d1.id),
    newCard('What year did WW2 end?','1945',d1.id),
    newCard('Who wrote "1984"?','George Orwell',d1.id),
    newCard('Como te llamas?','What is your name?',d2.id),
    newCard('Buenos dias','Good morning',d2.id),
    newCard('Gracias','Thank you',d2.id),
    newCard('Por favor','Please',d2.id),
  ];
  save();
}
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(state.toastTimer);state.toastTimer=setTimeout(()=>t.classList.remove('show'),2500);
}
function getDeckCards(id){return state.cards.filter(c=>c.deckId===id);}
function getDueCards(id){return getDeckCards(id).filter(isDue);}
function getNewCards(id){return getDeckCards(id).filter(isNew);}
function buildStudyQueue(id){
  const due=state.cards.filter(c=>c.deckId===id&&isDue(c)&&!isNew(c));
  const newC=state.cards.filter(c=>c.deckId===id&&isNew(c));
  return[...due,...newC.slice(0,20)];
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function render(){
  document.getElementById('app').innerHTML=renderNav()+`<div class="content">${renderContent()}</div>`+(state.modal?renderModal():'');
  attachEvents();
}
function renderNav(){
  return`<div class="nav">
    <span class="nav-brand">flash<span>.</span>cards</span>
    <div class="nav-tabs">
      ${['home','stats','data'].map(v=>`<button class="tab-btn${state.view===v?' active':''}" data-nav="${v}">${v==='home'?'Decks':v==='stats'?'Stats':'Data'}</button>`).join('')}
    </div>
  </div>`;
}
function renderContent(){
  if(state.view==='home')return renderHome();
  if(state.view==='study')return renderStudy();
  if(state.view==='browse')return renderBrowse();
  if(state.view==='stats')return renderStats();
  if(state.view==='data')return renderData();
  return'';
}
function renderHome(){
  return`<p class="section-title">Your Decks</p>
  <div class="deck-grid">
    ${state.decks.map(deck=>{
      const due=getDueCards(deck.id).length,newC=getNewCards(deck.id).length,total=getDeckCards(deck.id).length;
      return`<div class="deck-card${due>0?' has-due':''}" data-study="${deck.id}">
        <div class="deck-actions">
          <button class="icon-btn" data-browse="${deck.id}"><i class="ti ti-cards"></i></button>
          <button class="icon-btn danger" data-del-deck="${deck.id}"><i class="ti ti-trash"></i></button>
        </div>
        <div class="deck-name">${esc(deck.name)}</div>
        <div class="deck-stats">
          <span class="stat-new"><i class="ti ti-square-plus" style="font-size:13px;vertical-align:-1px"></i> ${newC}</span>
          <span class="stat-due"><i class="ti ti-clock" style="font-size:13px;vertical-align:-1px"></i> ${due}</span>
          <span class="stat-total">${total} cards</span>
        </div>
      </div>`;
    }).join('')}
    <button class="add-deck-btn" id="addDeckBtn"><i class="ti ti-plus" style="font-size:18px"></i> New deck</button>
  </div>`;
}
function renderStudy(){
  const deck=state.decks.find(d=>d.id===state.activeDeckId);if(!deck)return'';
  if(!state.studyStarted){
    const queue=buildStudyQueue(deck.id);
    const due=queue.filter(c=>!isNew(c)).length,newC=queue.filter(isNew).length;
    return`<div class="study-view">
      <div class="study-header" style="width:100%;max-width:560px">
        <button class="back-btn" data-nav="home"><i class="ti ti-arrow-left"></i> Decks</button>
        <span style="font-weight:500">${esc(deck.name)}</span>
      </div>
      <div class="study-start-card">
        <div class="done-icon"><i class="ti ti-school"></i></div>
        <div class="start-title">${esc(deck.name)}</div>
        <div class="start-stats"><span class="cnt-new">New: ${newC}</span><span class="cnt-due">Due: ${due}</span></div>
        ${queue.length?`<button class="btn btn-primary" id="startStudyBtn" style="width:100%">Study Now</button>`:`<p style="color:var(--accent);font-size:14px">All caught up!</p>`}
      </div>
    </div>`;
  }
  const queue=state.studyQueue;
  if(!queue.length||state.studyIdx>=queue.length){
    return`<div class="study-view">
      <div class="study-header" style="width:100%;max-width:560px">
        <button class="back-btn" data-nav="home"><i class="ti ti-arrow-left"></i> Decks</button>
      </div>
      <div class="done-state">
        <div class="done-icon"><i class="ti ti-circle-check"></i></div>
        <div class="done-title">Session complete!</div>
        <div class="done-sub">You reviewed ${queue.length} card${queue.length!==1?'s':''}.<br>Come back tomorrow!</div>
        <button class="btn btn-primary" data-nav="home">Back to decks</button>
      </div>
    </div>`;
  }
  const card=queue[state.studyIdx],total=queue.length,done=state.studyIdx,pct=Math.round((done/total)*100);
  const dueLeft=queue.slice(state.studyIdx).filter(c=>!isNew(c)).length;
  const newLeft=queue.slice(state.studyIdx).filter(isNew).length;
  return`<div class="study-view">
    <div class="study-header" style="width:100%;max-width:560px">
      <button class="back-btn" data-nav="home"><i class="ti ti-arrow-left"></i></button>
      <div class="study-progress"><div class="study-progress-bar" style="width:${pct}%"></div></div>
      <div class="study-counts"><span class="cnt-due">${dueLeft}</span><span class="cnt-new">${newLeft}</span><span class="cnt-done">${done}/${total}</span></div>
    </div>
    <div class="flashcard" id="flashcard" ${state.showAnswer?'':'data-flip="1"'}>
      <span class="flashcard-label">question</span>
      <div class="flashcard-text">${esc(card.front)}</div>
      ${state.showAnswer?`<div class="flashcard-divider"></div><span class="flashcard-label">answer</span><div class="flashcard-answer">${esc(card.back)}</div>`:`<span class="tap-hint">tap to reveal</span>`}
    </div>
    ${state.showAnswer?`<div class="answer-btns">
      ${[['Again','r-again',0],['Hard','r-hard',1],['Good','r-good',2],['Easy','r-easy',3]].map(([label,cls,r])=>`<button class="rating-btn ${cls}" data-rate="${r}">${label}<span class="interval">${getIntervalLabel(card,r)}</span></button>`).join('')}
    </div>`:`<button class="btn btn-secondary" id="showAnswerBtn" style="margin-top:20px">Show answer</button>`}
  </div>`;
}
function renderBrowse(){
  const deck=state.decks.find(d=>d.id===state.activeDeckId);if(!deck)return'';
  const cards=getDeckCards(deck.id);
  return`<div class="browse-header">
    <button class="back-btn" data-nav="home"><i class="ti ti-arrow-left"></i> Decks</button>
    <span class="browse-title">${esc(deck.name)}</span>
    <button class="btn btn-primary" style="margin-left:auto;font-size:13px;padding:7px 14px" data-add-card="${deck.id}"><i class="ti ti-plus"></i> Add card</button>
  </div>
  <div class="card-list">
    ${cards.length?cards.map(c=>`<div class="card-item">
      <div class="card-item-content">
        <div class="card-front">${esc(c.front)}</div>
        <div class="card-back">${esc(c.back)}</div>
      </div>
      <div class="card-item-actions">
        <button class="icon-btn" data-edit-card="${c.id}"><i class="ti ti-edit"></i></button>
        <button class="icon-btn danger" data-del-card="${c.id}"><i class="ti ti-trash"></i></button>
      </div>
    </div>`).join(''):`<div class="empty"><i class="ti ti-cards"></i><div>No cards yet</div></div>`}
  </div>`;
}
function renderStats(){
  const totalCards=state.cards.length,totalDecks=state.decks.length;
  const reviewed=state.cards.filter(c=>c.lastReviewed).length,due=state.cards.filter(isDue).length;
  return`<p class="section-title">Overview</p>
  <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:24px">
    ${[['Total cards',totalCards,'ti-cards'],['Decks',totalDecks,'ti-folder'],['Reviewed',reviewed,'ti-check'],['Due now',due,'ti-clock']].map(([label,val,icon])=>`
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px">
      <div style="font-size:12px;color:var(--text3);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.06em;font-weight:600"><i class="ti ${icon}" style="font-size:13px;vertical-align:-1px;margin-right:4px"></i>${label}</div>
      <div style="font-size:28px;font-weight:500;font-family:var(--mono)">${val}</div>
    </div>`).join('')}
  </div>
  <p class="section-title">Deck breakdown</p>
  <div class="card-list">
    ${state.decks.map(deck=>{
      const cards=getDeckCards(deck.id),due=cards.filter(isDue).length;
      const mature=cards.filter(c=>c.interval>=21).length,young=cards.filter(c=>c.reps>0&&c.interval<21).length,newC=cards.filter(isNew).length;
      return`<div class="card-item"><div class="card-item-content">
        <div class="card-front">${esc(deck.name)}</div>
        <div style="display:flex;gap:12px;font-size:12px;margin-top:4px">
          <span class="stat-new">New: ${newC}</span><span style="color:var(--warn)">Young: ${young}</span><span class="cnt-done">Mature: ${mature}</span><span class="stat-due">Due: ${due}</span>
        </div>
      </div></div>`;
    }).join('')}
  </div>`;
}
function renderData(){
  const json=JSON.stringify({decks:state.decks,cards:state.cards},null,2);
  return`<p class="section-title">Export / Import</p>
  <div class="export-box">

if(importAnkiBtn){
  importAnkiBtn.addEventListener('click', async ()=>{
    const fileInput=document.getElementById('ankiFileInput');
    const status=document.getElementById('ankiImportStatus');

    if(!fileInput.files.length){
      status.textContent='Choose a CSV file first.';
      return;
    }

    const file=fileInput.files[0];
    const text=await file.text();

    try{
      const lines=text.split(/\r?\n/).filter(l=>l.trim());

      if(lines.length===0){
        status.textContent='File is empty.';
        return;
      }

      let deckName=prompt(
        'Enter a deck name for imported cards:',
        'Imported Anki Deck'
      );

      if(!deckName) return;

      const deckId=crypto.randomUUID();

      state.decks.push({
        id:deckId,
        name:deckName,
        created:Date.now()
      });

      let imported=0;

      for(const line of lines){
        const parts=line.split(',');

        if(parts.length<2) continue;

        const front=parts[0]
          ?.replace(/^\"|\"$/g,'')
          .trim();

        const back=parts
          .slice(1)
          .join(',')
          .replace(/^\"|\"$/g,'')
          .trim();

        if(!front || !back) continue;

        state.cards.push(
          newCard(front,back,deckId)
        );

        imported++;
      }

      save();
      render();

      showToast(`Imported ${imported} cards!`);

    }catch(err){
      status.textContent='Failed to import file.';
      console.error(err);
    }
  });
